---
substitutions:
  name: 'lightsensor'
  i2c_sda_pin: GPIO5
  i2c_scl_pin: GPIO6
  spi_clk_pin: GPIO18
  spi_mosi_pin: GPIO19
  my_display_cs_pin: GPIO22
  my_display_dc_pin: GPIO21
  my_display_reset_pin: GPIO20

esphome:
  name: '${name}'
  name_add_mac_suffix: false
  project:
    name: 'dudemcbacon.${name}'
    version: '1.0'

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

api:
ota:
logger:

dashboard_import:
  package_import_url: github://dudemcbacon/esphome-projects/lightsensor.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Optional: captive portal for recovery
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

esp32_improv:
  authorizer: none

improv_serial:
  next_url: https://example.com/project-template/manual?ip={{ip_address}}&name={{device_name}}&version={{esphome_version}}

# I2C for BME280 and TSL2591
i2c:
  sda: '${i2c_sda_pin}'
  scl: '${i2c_scl_pin}'
  frequency: 100khz
  scan: false

spi:
  clk_pin: '${spi_clk_pin}'
  mosi_pin: '${spi_mosi_pin}'

bme68x_bsec2_i2c:
  model: bme680
  operating_age: 28d
  sample_rate: LP
  supply_voltage: 3.3V

sensor:
  - platform: bme280_i2c
    update_interval: 5s
    pressure:
      name: 'BME280 Pressure'
    temperature:
      name: 'BME280 temperature'
      id: temp_val
      on_value:
        then:
          - lvgl.label.update:
              id: temp_label
              text: !lambda 'return str_sprintf("%.1f°C", x);'
    humidity:
      name: 'BME280 humidity'
      id: hum_val
      on_value:
        then:
          - lvgl.label.update:
              id: hum_label
              text: !lambda 'return str_sprintf("RH: %.0f%%", x);'

  - platform: tsl2591
    id: my_tls2591
    update_interval: 5s
    gain: auto
    device_factor: 53
    glass_attenuation_factor: 14.4
    visible:
      name: 'TSL2591 visible light'
    infrared:
      name: 'TSL2591 infrared light'
    full_spectrum:
      name: 'TSL2591 full spectrum light'
    calculated_lux:
      id: i_lux
      name: 'TSL2591 Lux'
      on_value:
        then:
          - lvgl.label.update:
              id: lux_label
              text: !lambda 'return str_sprintf("%.0f Lux", x);'
    actual_gain:
      id: 'actual_gain'
      name: 'TSL2591 actual gain'
  # SCD41 - CO2, Temp, Humidity
  - platform: scd4x
    co2:
      name: 'SCD41 CO2'
    temperature:
      name: 'SCD41 Temperature'
    humidity:
      name: 'SCD41 Humidity'
    update_interval: 5s

  # BME680 - Gas Resistance (Air Quality)
  - platform: bme68x_bsec2
    temperature:
      name: 'BME68x Temperature'
    pressure:
      name: 'BME68x Pressure'
    humidity:
      name: 'BME68x Humidity'
    iaq:
      name: 'BME68x IAQ'
      id: iaq
    co2_equivalent:
      name: 'BME68x CO2 Equivalent'
    breath_voc_equivalent:
      name: 'BME68x Breath VOC Equivalent'

  - platform: sen5x
    id: sen55
    update_interval: 5s
    pm_1_0:
      name: SEN55 PM <1µm Weight concentration
    pm_2_5:
      name: SEN55 PM <2.5µm Weight concentration
    pm_4_0:
      name: SEN55 PM <4µm Weight concentration
    pm_10_0:
      name: SEN55 PM <10µm Weight concentration
    temperature:
      name: SEN55 Temperature
    humidity:
      name: SEN55 Humidity
    voc:
      name: SEN55 VOC
    nox:
      name: SEN55 NOX

  # SDP810 - Differential Pressure
  - platform: sdp3x
    update_interval: 5s
    name: 'HVAC Filter Pressure drop'
    id: filter_pressure

display:
  - platform: ili9xxx
    model: gc9a01a
    id: my_display
    cs_pin: '${my_display_cs_pin}'
    dc_pin: '${my_display_dc_pin}'
    reset_pin: '${my_display_reset_pin}'
    rotation: 0
    invert_colors: true

lvgl:
  # Fixed syntax: just a list of IDs
  displays:
    - my_display
  update_interval: 1s
  bg_color: 0x000000
  widgets:
    - obj:
        height: 240
        width: 240
        align: CENTER
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: CENTER
          flex_align_cross: CENTER
        # Fixed syntax: containers use 'widgets' to nest children
        widgets:
          - label:
              text: 'ENVIRONMENT'
              text_font: montserrat_14
              text_color: 0x808080
          - label:
              id: temp_label
              text: '--.-°C'
              text_font: montserrat_26
              text_color: 0x00FF00
          - label:
              id: lux_label
              text: '-- Lux'
              text_font: montserrat_20
              text_color: 0xFFAA00
          - label:
              id: hum_label
              text: 'RH: --%'
              text_font: montserrat_14
              text_color: 0x00AAFF
          - label:
              id: co2_label
              text: 'CO2: --'
              text_font: montserrat_14
              text_color: 0xFF00FF # Magenta
          - label:
              id: pm_label
              text: 'PM2.5: --'
              text_font: montserrat_14
              text_color: 0xFFFFFF # White
          - label:
              id: gas_label
              text: 'Gas: --'
              text_font: montserrat_14
              text_color: 0x00FFFF # Cyan
          - label:
              id: diff_press_label
              text: 'Diff: --'
              text_font: montserrat_14
              text_color: 0xAAAAAA # Light Grey
